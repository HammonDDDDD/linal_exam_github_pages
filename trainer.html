<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Тренажёр · Линейная Алгебра: Экзамен</title><link rel="stylesheet" href="assets/style.css"><link rel="icon" href="assets/favicon.svg" type="image/svg+xml"><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true,macros:{R:"\\mathbb{R}",C:"\\mathbb{C}",F:"\\mathbb{F}",Ker:"\\operatorname{Ker}",rk:"\\operatorname{rk}",tr:"\\operatorname{tr}",Sym:"\\operatorname{Sym}",Alt:"\\operatorname{Alt}",dist:"\\operatorname{dist}",pr:"\\operatorname{pr}",ort:"\\operatorname{ort}",End:"\\operatorname{End}",Hom:"\\operatorname{Hom}"}},svg:{fontCache:"global"}};</script><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script></head><body><header class="topbar"><a class="brand" href="index.html"><span class="brand-icon">LA</span><span>Линейная Алгебра: Экзамен</span></a><nav><a class="" href="index.html">Билеты</a><a class="" href="map.html">Карта</a><a class="active" href="trainer.html">Тренажёр</a><a class="" href="formulas.html">Формулы</a><a class="" href="interactives.html">Интерактивы</a></nav><button id="themeToggle" class="icon-button">◐</button></header><main class="container"><h1 class="section-title">Тренажёр</h1><div class="panel"><p>Карточки покрывают все 27 билетов: минимум 3 карточки на каждый билет. Клик по карточке переворачивает её.</p><div class="filters"><select id="trainerTicket"><option value="all">Все билеты</option><option value="1">Билет 1</option><option value="2">Билет 2</option><option value="3">Билет 3</option><option value="4">Билет 4</option><option value="5">Билет 5</option><option value="6">Билет 6</option><option value="7">Билет 7</option><option value="8">Билет 8</option><option value="9">Билет 9</option><option value="10">Билет 10</option><option value="11">Билет 11</option><option value="12">Билет 12</option><option value="13">Билет 13</option><option value="14">Билет 14</option><option value="15">Билет 15</option><option value="16">Билет 16</option><option value="17">Билет 17</option><option value="18">Билет 18</option><option value="19">Билет 19</option><option value="20">Билет 20</option><option value="21">Билет 21</option><option value="22">Билет 22</option><option value="23">Билет 23</option><option value="24">Билет 24</option><option value="25">Билет 25</option><option value="26">Билет 26</option><option value="27">Билет 27</option></select></div><div id="flashcard" class="flashcard ticket-card"></div><div class="actions"><button id="prevCard" class="button secondary">← Назад</button><button id="flipCard" class="button">Показать ответ</button><button id="nextCard" class="button secondary">Дальше →</button></div></div></main><script>const allCards=[{"ticket": 1, "q": "Билет 1: главный объект?", "a": "Билинейная форма линейна по каждому аргументу отдельно: $\\beta(\\alpha x_1+x_2,y)=\\alpha\\beta(x_1,y)+\\beta(x_2,y)$ и аналогично по второму аргументу."}, {"ticket": 1, "q": "Билет 1: ключевая формула?", "a": "$\\beta(x,y)=X^TBY$"}, {"ticket": 1, "q": "Билет 1: типичный вопрос?", "a": "Почему ранг билинейной формы не зависит от базиса?"}, {"ticket": 1, "q": "Билет 1: ещё одна формула?", "a": "$\\widetilde B=C^TBC$"}, {"ticket": 2, "q": "Билет 2: главный объект?", "a": "Симметрическая форма удовлетворяет $\\beta(x,y)=\\beta(y,x)$; кососимметрическая — $\\beta(x,y)=-\\beta(y,x)$."}, {"ticket": 2, "q": "Билет 2: ключевая формула?", "a": "$B^T=B$"}, {"ticket": 2, "q": "Билет 2: типичный вопрос?", "a": "Почему у кососимметрической формы диагональ матрицы нулевая?"}, {"ticket": 2, "q": "Билет 2: ещё одна формула?", "a": "$B^T=-B$"}, {"ticket": 3, "q": "Билет 3: главный объект?", "a": "Квадратичная форма связана с симметрической билинейной формой через $q(x)=\\beta(x,x)$."}, {"ticket": 3, "q": "Билет 3: ключевая формула?", "a": "$q(x)=\\beta(x,x)$"}, {"ticket": 3, "q": "Билет 3: типичный вопрос?", "a": "Как восстановить билинейную форму из квадратичной?"}, {"ticket": 3, "q": "Билет 3: ещё одна формула?", "a": "$\\beta(x,y)=\\frac{q(x+y)-q(x)-q(y)}{2}$"}, {"ticket": 4, "q": "Билет 4: главный объект?", "a": "Метод Лагранжа работает через выделение полного квадрата и индукцию по числу переменных."}, {"ticket": 4, "q": "Билет 4: ключевая формула?", "a": "$q=a_{11}(x_1+\\cdots)^2+q_1$"}, {"ticket": 4, "q": "Билет 4: типичный вопрос?", "a": "Когда метод Якоби нельзя применить напрямую?"}, {"ticket": 4, "q": "Билет 4: ещё одна формула?", "a": "$q=\\Delta_1y_1^2+\\frac{\\Delta_2}{\\Delta_1}y_2^2+\\cdots+\\frac{\\Delta_n}{\\Delta_{n-1}}y_n^2$"}, {"ticket": 5, "q": "Билет 5: главный объект?", "a": "Положительно определённая форма: $q(x)>0$ для всех $x\\ne0$."}, {"ticket": 5, "q": "Билет 5: ключевая формула?", "a": "$q(x)>0\\quad(x\\ne0)$"}, {"ticket": 5, "q": "Билет 5: типичный вопрос?", "a": "Почему критерий Сильвестра требует симметричности?"}, {"ticket": 5, "q": "Билет 5: ещё одна формула?", "a": "$\\Delta_1>0,\\ldots,\\Delta_n>0$"}, {"ticket": 6, "q": "Билет 6: главный объект?", "a": "Евклидово пространство — вещественное пространство со скалярным произведением."}, {"ticket": 6, "q": "Билет 6: ключевая формула?", "a": "$\\|x\\|=\\sqrt{(x,x)}$"}, {"ticket": 6, "q": "Билет 6: типичный вопрос?", "a": "Как из Коши–Буняковского получить треугольник?"}, {"ticket": 6, "q": "Билет 6: ещё одна формула?", "a": "$|(x,y)|\\le\\|x\\|\\|y\\|$"}, {"ticket": 7, "q": "Билет 7: главный объект?", "a": "Векторы ортогональны, если $(x,y)=0$."}, {"ticket": 7, "q": "Билет 7: ключевая формула?", "a": "$U^\\perp=\\{x\\mid(x,u)=0\\ \\forall u\\in U\\}$"}, {"ticket": 7, "q": "Билет 7: типичный вопрос?", "a": "Почему $U\\cap U^\\perp=0$?"}, {"ticket": 7, "q": "Билет 7: ещё одна формула?", "a": "$V=U\\oplus U^\\perp$"}, {"ticket": 8, "q": "Билет 8: главный объект?", "a": "Матрица Грама системы $x_1,\\ldots,x_k$: $G=((x_i,x_j))$."}, {"ticket": 8, "q": "Билет 8: ключевая формула?", "a": "$G=( (x_i,x_j) )$"}, {"ticket": 8, "q": "Билет 8: типичный вопрос?", "a": "Когда определитель Грама равен нулю?"}, {"ticket": 8, "q": "Билет 8: ещё одна формула?", "a": "$\\operatorname{Vol}^2=\\det G$"}, {"ticket": 9, "q": "Билет 9: главный объект?", "a": "Метрика из нормы: $\\rho(x,y)=\\|x-y\\|$."}, {"ticket": 9, "q": "Билет 9: ключевая формула?", "a": "$\\rho(x,y)=\\|x-y\\|$"}, {"ticket": 9, "q": "Билет 9: типичный вопрос?", "a": "Как доказать треугольник для метрики?"}, {"ticket": 9, "q": "Билет 9: ещё одна формула?", "a": "$\\operatorname{dist}(x,U)=\\|x-\\operatorname{pr}_Ux\\|$"}, {"ticket": 10, "q": "Билет 10: главный объект?", "a": "Изоморфизм евклидовых пространств — линейная биекция, сохраняющая скалярное произведение."}, {"ticket": 10, "q": "Билет 10: ключевая формула?", "a": "$(f(x),f(y))=(x,y)$"}, {"ticket": 10, "q": "Билет 10: типичный вопрос?", "a": "Почему равенство размерностей достаточно?"}, {"ticket": 10, "q": "Билет 10: ещё одна формула?", "a": "$\\|f(x)\\|=\\|x\\|$"}, {"ticket": 11, "q": "Билет 11: главный объект?", "a": "Невырожденная форма даёт изоморфизм $V\\simeq V^*$."}, {"ticket": 11, "q": "Билет 11: ключевая формула?", "a": "$v\\mapsto (\\cdot,v)$"}, {"ticket": 11, "q": "Билет 11: типичный вопрос?", "a": "Почему скалярное произведение отождествляет $V$ и $V^*$?"}, {"ticket": 11, "q": "Билет 11: ещё одна формула?", "a": "$\\beta(x,y)=(x,Ay)$"}, {"ticket": 12, "q": "Билет 12: главный объект?", "a": "Эрмитово произведение линейно по первому аргументу и сопряжённо-линейно по второму: $(x,\\lambda y)=\\overline\\lambda(x,y)$."}, {"ticket": 12, "q": "Билет 12: ключевая формула?", "a": "$(x,y)=\\overline{(y,x)}$"}, {"ticket": 12, "q": "Билет 12: типичный вопрос?", "a": "Где появляется комплексное сопряжение?"}, {"ticket": 12, "q": "Билет 12: ещё одна формула?", "a": "$(x,\\lambda y)=\\overline\\lambda(x,y)$"}, {"ticket": 13, "q": "Билет 13: главный объект?", "a": "Нормальный оператор удовлетворяет $AA^*=A^*A$."}, {"ticket": 13, "q": "Билет 13: ключевая формула?", "a": "$AA^*=A^*A$"}, {"ticket": 13, "q": "Билет 13: типичный вопрос?", "a": "Почему самосопряжённый оператор нормален?"}, {"ticket": 13, "q": "Билет 13: ещё одна формула?", "a": "$U^*AU=\\operatorname{diag}(\\lambda_i)$"}, {"ticket": 14, "q": "Билет 14: главный объект?", "a": "Самосопряжённый: $A^*=A$, собственные значения вещественны."}, {"ticket": 14, "q": "Билет 14: ключевая формула?", "a": "$A^*=A$"}, {"ticket": 14, "q": "Билет 14: типичный вопрос?", "a": "Какой спектр у унитарного оператора?"}, {"ticket": 14, "q": "Билет 14: ещё одна формула?", "a": "$A^*=-A$"}, {"ticket": 15, "q": "Билет 15: главный объект?", "a": "В евклидовом пространстве $q(x)=(Ax,x)$ для некоторого самосопряжённого $A$."}, {"ticket": 15, "q": "Билет 15: ключевая формула?", "a": "$q(x)=(Ax,x)$"}, {"ticket": 15, "q": "Билет 15: типичный вопрос?", "a": "Почему оператор самосопряжён?"}, {"ticket": 15, "q": "Билет 15: ещё одна формула?", "a": "$q=\\sum\\lambda_i y_i^2$"}, {"ticket": 16, "q": "Билет 16: главный объект?", "a": "$A\\ge0$ означает $(Ax,x)\\ge0$ для всех $x$."}, {"ticket": 16, "q": "Билет 16: ключевая формула?", "a": "$(Ax,x)\\ge0$"}, {"ticket": 16, "q": "Билет 16: типичный вопрос?", "a": "Почему собственные значения положительного оператора положительны?"}, {"ticket": 16, "q": "Билет 16: ещё одна формула?", "a": "$(Ax,x)>0$ при $x\\ne0$"}, {"ticket": 17, "q": "Билет 17: главный объект?", "a": "Полярное разложение — аналог $z=re^{i\\varphi}$: оператор = изометрическая часть × положительная часть."}, {"ticket": 17, "q": "Билет 17: ключевая формула?", "a": "$A=UP$"}, {"ticket": 17, "q": "Билет 17: типичный вопрос?", "a": "Почему $A^*A$ положителен?"}, {"ticket": 17, "q": "Билет 17: ещё одна формула?", "a": "$P=(A^*A)^{1/2}$"}, {"ticket": 18, "q": "Билет 18: главный объект?", "a": "Норма удовлетворяет положительности, однородности и неравенству треугольника."}, {"ticket": 18, "q": "Билет 18: ключевая формула?", "a": "$\\|x\\|\\ge0,\\quad \\|\\alpha x\\|=|\\alpha|\\|x\\|$"}, {"ticket": 18, "q": "Билет 18: типичный вопрос?", "a": "Какие аксиомы у нормы?"}, {"ticket": 18, "q": "Билет 18: ещё одна формула?", "a": "$\\|x+y\\|^2+\\|x-y\\|^2=2\\|x\\|^2+2\\|y\\|^2$"}, {"ticket": 19, "q": "Билет 19: главный объект?", "a": "Аффинная плоскость имеет вид $A+U$, где $A$ — точка, $U$ — направляющее подпространство."}, {"ticket": 19, "q": "Билет 19: ключевая формула?", "a": "$A+U$"}, {"ticket": 19, "q": "Билет 19: типичный вопрос?", "a": "Почему берётся $(U+W)^\\perp$?"}, {"ticket": 19, "q": "Билет 19: ещё одна формула?", "a": "$\\operatorname{dist}(A+U,B+W)=\\|\\operatorname{pr}_{(U+W)^\\perp}\\overrightarrow{AB}\\|$"}, {"ticket": 20, "q": "Билет 20: главный объект?", "a": "Центр масс $C$ задаётся условием $\\sum m_i\\overrightarrow{CP_i}=0$."}, {"ticket": 20, "q": "Билет 20: ключевая формула?", "a": "$\\sum_i m_i\\overrightarrow{CP_i}=0$"}, {"ticket": 20, "q": "Билет 20: типичный вопрос?", "a": "Почему смешанный член равен нулю?"}, {"ticket": 20, "q": "Билет 20: ещё одна формула?", "a": "$I_A=\\sum_i m_i\\|\\overrightarrow{AP_i}\\|^2$"}, {"ticket": 21, "q": "Билет 21: главный объект?", "a": "Квадрика задаётся уравнением $(Ax,x)+2(b,x)+c=0$ с самосопряжённым $A$."}, {"ticket": 21, "q": "Билет 21: ключевая формула?", "a": "$(Ax,x)+2(b,x)+c=0$"}, {"ticket": 21, "q": "Билет 21: типичный вопрос?", "a": "Как понять, что квадрика центральная?"}, {"ticket": 21, "q": "Билет 21: ещё одна формула?", "a": "$Ax_0=-b$"}, {"ticket": 22, "q": "Билет 22: главный объект?", "a": "Тензор фиксированного типа — полилинейная функция от заданного числа аргументов."}, {"ticket": 22, "q": "Билет 22: ключевая формула?", "a": "$(p,q)$"}, {"ticket": 22, "q": "Билет 22: типичный вопрос?", "a": "Почему нельзя складывать тензоры разных типов?"}, {"ticket": 22, "q": "Билет 22: ещё одна формула?", "a": "$T^0_0=\\mathbb F,\\ T^1_0=V^*,\\ T^0_1\\simeq V$"}, {"ticket": 23, "q": "Билет 23: главный объект?", "a": "Тензорный базис строится из произведений базисных ковекторов и базисных векторов."}, {"ticket": 23, "q": "Билет 23: ключевая формула?", "a": "$e^{i_1}\\otimes\\cdots\\otimes e^{i_p}\\otimes e_{j_1}\\otimes\\cdots\\otimes e_{j_q}$"}, {"ticket": 23, "q": "Билет 23: типичный вопрос?", "a": "Что такое сопряжённый базис?"}, {"ticket": 23, "q": "Билет 23: ещё одна формула?", "a": "$T^{j_1\\ldots j_q}_{i_1\\ldots i_p}$"}, {"ticket": 24, "q": "Билет 24: главный объект?", "a": "Свёртка связывает один верхний и один нижний индекс и уменьшает тип на $(1,1)$."}, {"ticket": 24, "q": "Билет 24: ключевая формула?", "a": "$C(T)^a_b=T^{ia}_{ib}$"}, {"ticket": 24, "q": "Билет 24: типичный вопрос?", "a": "Почему свёртка не зависит от базиса?"}, {"ticket": 24, "q": "Билет 24: ещё одна формула?", "a": "$\\operatorname{tr}A=A^i_i$"}, {"ticket": 25, "q": "Билет 25: главный объект?", "a": "Симметрический тензор не меняется при перестановке аргументов."}, {"ticket": 25, "q": "Билет 25: ключевая формула?", "a": "$\\operatorname{Sym}T=\\frac1{p!}\\sum_{\\sigma\\in S_p}F_\\sigma T$"}, {"ticket": 25, "q": "Билет 25: типичный вопрос?", "a": "Почему $\\operatorname{Sym}$ — проектор?"}, {"ticket": 25, "q": "Билет 25: ещё одна формула?", "a": "$\\operatorname{Alt}T=\\frac1{p!}\\sum_{\\sigma\\in S_p}\\operatorname{sgn}(\\sigma)F_\\sigma T$"}, {"ticket": 26, "q": "Билет 26: главный объект?", "a": "Симметрическое произведение — симметризация тензорного произведения."}, {"ticket": 26, "q": "Билет 26: ключевая формула?", "a": "$S\\odot T=\\operatorname{Sym}(S\\otimes T)$"}, {"ticket": 26, "q": "Билет 26: типичный вопрос?", "a": "Почему размерность равна числу мономов?"}, {"ticket": 26, "q": "Билет 26: ещё одна формула?", "a": "$\\dim S^p(V^*)=\\binom{n+p-1}{p}$"}, {"ticket": 27, "q": "Билет 27: главный объект?", "a": "Внешнее произведение строится через альтернирование тензорного произведения."}, {"ticket": 27, "q": "Билет 27: ключевая формула?", "a": "$\\alpha\\wedge\\beta=\\operatorname{Alt}(\\alpha\\otimes\\beta)$"}, {"ticket": 27, "q": "Билет 27: типичный вопрос?", "a": "Почему повтор даёт ноль?"}, {"ticket": 27, "q": "Билет 27: ещё одна формула?", "a": "$\\alpha\\wedge\\beta=(-1)^{pq}\\beta\\wedge\\alpha$"}];let pool=allCards,i=0,flipped=false;const el=document.getElementById('flashcard'),sel=document.getElementById('trainerTicket');function render(){const c=pool[i]||allCards[0];el.innerHTML=`<div><div>${flipped?c.a:c.q}</div><div class="flash-meta">Билет ${c.ticket} · карточка ${i+1}/${pool.length}</div></div>`;if(window.MathJax)MathJax.typesetPromise([el]);}sel.onchange=()=>{pool=sel.value==='all'?allCards:allCards.filter(c=>String(c.ticket)===sel.value);i=0;flipped=false;render();};flipCard.onclick=()=>{flipped=!flipped;render();};nextCard.onclick=()=>{i=(i+1)%pool.length;flipped=false;render();};prevCard.onclick=()=>{i=(i-1+pool.length)%pool.length;flipped=false;render();};el.onclick=()=>{flipped=!flipped;render();};render();</script><footer class="footer"><p>Линейная Алгебра: Экзамен · билеты 1–27 · статический GitHub Pages.</p><p><a href="sources.html">Источники</a></p></footer><script src="assets/app.js"></script></body></html>
