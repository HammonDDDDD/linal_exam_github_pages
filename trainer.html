<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Тренажёр устного ответа · Линейная Алгебра: Экзамен</title><link rel="stylesheet" href="assets/style.css"><link rel="icon" href="assets/favicon.svg" type="image/svg+xml"><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true,macros:{R:"\\mathbb{R}",C:"\\mathbb{C}",F:"\\mathbb{F}",Ker:"\\operatorname{Ker}",rk:"\\operatorname{rk}",tr:"\\operatorname{tr}",Sym:"\\operatorname{Sym}",Alt:"\\operatorname{Alt}",dist:"\\operatorname{dist}",pr:"\\operatorname{pr}",ort:"\\operatorname{ort}",End:"\\operatorname{End}",Hom:"\\operatorname{Hom}"}},svg:{fontCache:"global"}};</script><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script></head><body><header class="topbar"><a class="brand" href="index.html"><span class="brand-icon">LA</span><span>Линейная Алгебра: Экзамен</span></a><nav><a class="" href="index.html">Билеты</a><a class="" href="map.html">Карта</a><a class="active" href="trainer.html">Тренажёр устного ответа</a><a class="" href="formulas.html">Формулы</a><a class="" href="interactives.html">Интерактивы</a></nav><button id="themeToggle" class="icon-button">◐</button></header><main class="container"><h1 class="section-title">Тренажёр устного ответа</h1><div class="panel"><p>Карточки сформулированы как реальные устные вопросы. Всего 108 карточек: по 4 на каждый билет.</p><div class="filters"><select id="trainerTicket"><option value="all">Все билеты</option><option value="1">Билет 1</option><option value="2">Билет 2</option><option value="3">Билет 3</option><option value="4">Билет 4</option><option value="5">Билет 5</option><option value="6">Билет 6</option><option value="7">Билет 7</option><option value="8">Билет 8</option><option value="9">Билет 9</option><option value="10">Билет 10</option><option value="11">Билет 11</option><option value="12">Билет 12</option><option value="13">Билет 13</option><option value="14">Билет 14</option><option value="15">Билет 15</option><option value="16">Билет 16</option><option value="17">Билет 17</option><option value="18">Билет 18</option><option value="19">Билет 19</option><option value="20">Билет 20</option><option value="21">Билет 21</option><option value="22">Билет 22</option><option value="23">Билет 23</option><option value="24">Билет 24</option><option value="25">Билет 25</option><option value="26">Билет 26</option><option value="27">Билет 27</option></select></div><div id="flashcard" class="flashcard ticket-card"></div><div class="actions"><button id="prevCard" class="button secondary">← Назад</button><button id="flipCard" class="button">Показать ответ</button><button id="nextCard" class="button secondary">Дальше →</button></div></div></main><script>const allCards=[{"ticket": 1, "q": "Что такое билинейная форма?", "a": "Билинейная форма линейна по каждому аргументу отдельно: $\\beta(\\alpha x_1+x_2,y)=\\alpha\\beta(x_1,y)+\\beta(x_2,y)$ и аналогично по второму аргументу."}, {"ticket": 1, "q": "Почему ранг билинейной формы не зависит от базиса?", "a": "Матрица формы зависит от базиса, но её ранг не зависит, потому что при замене базиса происходит умножение на невырожденные матрицы слева и справа."}, {"ticket": 1, "q": "Чем отличаются левое и правое ядро?", "a": "Левое ядро: $\\operatorname{Ker}_L\\beta=\\{x\\mid\\beta(x,y)=0\\ \\forall y\\}$. Правое ядро: $\\operatorname{Ker}_R\\beta=\\{y\\mid\\beta(x,y)=0\\ \\forall x\\}$."}, {"ticket": 1, "q": "Как по матрице понять, что форма невырождена?", "a": "Невырожденность в конечномерном случае эквивалентна $\\det B\\ne0$ и нулевым ядрам."}, {"ticket": 2, "q": "Что такое симметрическая и кососимметрическая билинейная форма?", "a": "Симметрическая форма удовлетворяет $\\beta(x,y)=\\beta(y,x)$; кососимметрическая — $\\beta(x,y)=-\\beta(y,x)$."}, {"ticket": 2, "q": "Почему у кососимметрической формы диагональ матрицы нулевая?", "a": "Для кососимметрической формы над полем характеристики не 2 всегда $\\beta(x,x)=0$."}, {"ticket": 2, "q": "Когда $V=U\\oplus U^\\perp$?", "a": "Относительно произвольной билинейной формы нужно различать правое и левое ортогональные дополнения."}, {"ticket": 2, "q": "Почему для несимметричной формы нужны левое и правое дополнения?", "a": "Если форма симметрическая и невырожденная, то $\\dim U^\\perp=n-\\dim U$; при невырожденности ограничения на $U$ имеем $V=U\\oplus U^\\perp$."}, {"ticket": 3, "q": "Что такое квадратичная форма?", "a": "Квадратичная форма связана с симметрической билинейной формой через $q(x)=\\beta(x,x)$."}, {"ticket": 3, "q": "Как восстановить билинейную форму из квадратичной?", "a": "Поляризация над полем характеристики не 2 восстанавливает форму: $\\beta(x,y)=\\frac12(q(x+y)-q(x)-q(y))$."}, {"ticket": 3, "q": "Чем канонический вид отличается от нормального?", "a": "Канонический вид получается невырожденной линейной заменой координат."}, {"ticket": 3, "q": "Что означает число плюсов и минусов в нормальном виде?", "a": "Нормальный вид над $\\mathbb R$: $y_1^2+\\cdots+y_p^2-y_{p+1}^2-\\cdots-y_{p+q}^2$."}, {"ticket": 4, "q": "В чём идея метода Лагранжа?", "a": "Метод Лагранжа работает через выделение полного квадрата и индукцию по числу переменных."}, {"ticket": 4, "q": "Когда метод Якоби нельзя применить напрямую?", "a": "Метод Якоби применим, когда ведущие главные миноры $\\Delta_k$ ненулевые."}, {"ticket": 4, "q": "Что именно утверждает закон инерции?", "a": "Закон инерции: числа положительных, отрицательных и нулевых квадратов в нормальном виде не зависят от приведения."}, {"ticket": 4, "q": "Почему ранг кососимметрической формы чётен?", "a": "Кососимметрическая форма имеет канонические блоки $\\begin{pmatrix}0&1\\\\-1&0\\end{pmatrix}$ и нулевой блок ядра."}, {"ticket": 5, "q": "Что значит положительная определённость формы?", "a": "Положительно определённая форма: $q(x)>0$ для всех $x\\ne0$."}, {"ticket": 5, "q": "Почему критерий Сильвестра требует симметричности?", "a": "Отрицательно определённая: $q(x)<0$ для всех $x\\ne0$."}, {"ticket": 5, "q": "Как проверить отрицательную определённость?", "a": "Критерий Сильвестра для симметрической матрицы: положительная определённость эквивалентна положительности всех ведущих главных миноров."}, {"ticket": 5, "q": "Почему полуопределённость не ловится простым вариантом критерия?", "a": "Отрицательная определённость: знаки ведущих миноров чередуются: $\\Delta_1<0,\\Delta_2>0,\\Delta_3<0,\\ldots$."}, {"ticket": 6, "q": "Что такое евклидово пространство?", "a": "Евклидово пространство — вещественное пространство со скалярным произведением."}, {"ticket": 6, "q": "Как из Коши–Буняковского получить треугольник?", "a": "Норма из скалярного произведения: $\\|x\\|=\\sqrt{(x,x)}$."}, {"ticket": 6, "q": "Когда достигается равенство в Коши–Буняковском?", "a": "Коши–Буняковский: $|(x,y)|\\le\\|x\\|\\|y\\|$."}, {"ticket": 6, "q": "Как скалярное произведение задаёт угол?", "a": "Теорема косинусов: $\\|x-y\\|^2=\\|x\\|^2+\\|y\\|^2-2(x,y)$."}, {"ticket": 7, "q": "Когда векторы называются ортогональными?", "a": "Векторы ортогональны, если $(x,y)=0$."}, {"ticket": 7, "q": "Почему $U\\cap U^\\perp=0$?", "a": "Ортогональное дополнение $U^\\perp$ всегда подпространство."}, {"ticket": 7, "q": "Как найти проекцию на подпространство с неортонормированным базисом?", "a": "В конечномерном евклидовом пространстве каждый вектор единственно раскладывается: $x=\\operatorname{pr}_Ux+\\operatorname{ort}_Ux$."}, {"ticket": 7, "q": "Почему столбцы ортогональной матрицы образуют ортонормированный базис?", "a": "Матрица перехода между ортонормированными базисами ортогональна: $Q^TQ=I$."}, {"ticket": 8, "q": "Что такое матрица Грама?", "a": "Матрица Грама системы $x_1,\\ldots,x_k$: $G=((x_i,x_j))$."}, {"ticket": 8, "q": "Когда определитель Грама равен нулю?", "a": "Если $X$ — матрица столбцов координат, то $G=X^TX$, поэтому $\\det G\\ge0$."}, {"ticket": 8, "q": "Почему QR — матричная запись Грама–Шмидта?", "a": "Грам–Шмидт вычитает из очередного вектора его проекцию на уже построенное подпространство."}, {"ticket": 8, "q": "Как объём связан с определителем Грама?", "a": "Для полной системы $\\sqrt{\\det G}$ — объём параллелепипеда."}, {"ticket": 9, "q": "Что такое метрика, порождённая нормой?", "a": "Метрика из нормы: $\\rho(x,y)=\\|x-y\\|$."}, {"ticket": 9, "q": "Как доказать треугольник для метрики?", "a": "Неравенство треугольника для метрики следует из неравенства треугольника для нормы."}, {"ticket": 9, "q": "Почему ближайшая точка в $U$ — проекция?", "a": "Расстояние от $x$ до $U$ равно длине ортогональной составляющей."}, {"ticket": 9, "q": "Что происходит с углом, если проекция равна нулю?", "a": "Угол с подпространством определяют через проекцию: $\\cos\\varphi=\\|\\operatorname{pr}_Ux\\|/\\|x\\|$."}, {"ticket": 10, "q": "Что такое изоморфизм евклидовых пространств?", "a": "Изоморфизм евклидовых пространств — линейная биекция, сохраняющая скалярное произведение."}, {"ticket": 10, "q": "Почему равенство размерностей достаточно?", "a": "Если $f$ сохраняет скалярное произведение, то сохраняет нормы и углы."}, {"ticket": 10, "q": "Как выглядит изоморфизм в ОНБ?", "a": "Любые два конечномерных евклидовых пространства одинаковой размерности изоморфны."}, {"ticket": 10, "q": "Почему сохранение скалярного произведения сильнее сохранения длины?", "a": "В ортонормированных базисах изоморфизм имеет ортогональную матрицу."}, {"ticket": 11, "q": "Как скалярное произведение отождествляет $V$ и $V^*$?", "a": "Невырожденная форма даёт изоморфизм $V\\simeq V^*$."}, {"ticket": 11, "q": "Почему скалярное произведение отождествляет $V$ и $V^*$?", "a": "В евклидовом пространстве любой билинейной форме $\\beta$ соответствует оператор $A$: $\\beta(x,y)=(x,Ay)$."}, {"ticket": 11, "q": "Как по форме получить оператор?", "a": "Сопряжённый оператор задаётся равенством $(Ax,y)=(x,A^*y)$."}, {"ticket": 11, "q": "Что значит самосопряжённость?", "a": "В ортонормированном базисе матрица $A^*$ равна $A^T$ над $\\mathbb R$ и $A^*$ над $\\mathbb C$."}, {"ticket": 12, "q": "Что такое эрмитово произведение?", "a": "Эрмитово произведение линейно по первому аргументу и сопряжённо-линейно по второму: $(x,\\lambda y)=\\overline\\lambda(x,y)$."}, {"ticket": 12, "q": "Где появляется комплексное сопряжение?", "a": "Эрмитова симметричность: $(x,y)=\\overline{(y,x)}$."}, {"ticket": 12, "q": "Почему $(x,x)$ вещественно и неотрицательно?", "a": "Коши–Буняковский: $|(x,y)|^2\\le(x,x)(y,y)$."}, {"ticket": 12, "q": "Как доказать Коши–Буняковского через $x-\\lambda y$?", "a": "Сопряжённый оператор: $(Ax,y)=(x,A^*y)$."}, {"ticket": 13, "q": "Что такое нормальный оператор?", "a": "Нормальный оператор удовлетворяет $AA^*=A^*A$."}, {"ticket": 13, "q": "Почему самосопряжённый оператор нормален?", "a": "Если $A$ нормален, то $\\|Ax\\|=\\|A^*x\\|$."}, {"ticket": 13, "q": "Что даёт нормальность для диагонализации?", "a": "Собственные подпространства нормального оператора для разных собственных значений ортогональны."}, {"ticket": 13, "q": "Почему обычной диагонализуемости недостаточно для ОНБ?", "a": "В конечномерном эрмитовом пространстве нормальный оператор диагонализуется в ортонормированном базисе."}, {"ticket": 14, "q": "Что такое самосопряжённый оператор?", "a": "Самосопряжённый: $A^*=A$, собственные значения вещественны."}, {"ticket": 14, "q": "Какой спектр у унитарного оператора?", "a": "Кососамосопряжённый: $A^*=-A$, собственные значения чисто мнимые над $\\mathbb C$."}, {"ticket": 14, "q": "Почему у самосопряжённого оператора собственные значения вещественны?", "a": "Ортогональный/унитарный: $A^*A=I$, собственные значения имеют модуль 1."}, {"ticket": 14, "q": "Как выглядит канонический вид ортогонального оператора над $\\mathbb R$?", "a": "В вещественном ортогональном случае канонический вид состоит из блоков $1$, $-1$ и поворотов $R_\\varphi$."}, {"ticket": 15, "q": "Как квадратичная форма связана с самосопряжённым оператором?", "a": "В евклидовом пространстве $q(x)=(Ax,x)$ для некоторого самосопряжённого $A$."}, {"ticket": 15, "q": "Почему оператор самосопряжён?", "a": "Самосопряжённый оператор имеет ОНБ из собственных векторов."}, {"ticket": 15, "q": "Как убрать смешанные члены?", "a": "В этом ОНБ $q(x)=\\lambda_1y_1^2+\\cdots+\\lambda_ny_n^2$."}, {"ticket": 15, "q": "Почему главные оси ортогональны?", "a": "Направления собственных векторов — главные оси квадратичной формы."}, {"ticket": 16, "q": "Что значит $A\\ge0$ для самосопряжённого оператора?", "a": "$A\\ge0$ означает $(Ax,x)\\ge0$ для всех $x$."}, {"ticket": 16, "q": "Почему собственные значения положительного оператора положительны?", "a": "Если $A$ самосопряжён и неотрицателен, его собственные значения неотрицательны."}, {"ticket": 16, "q": "Как построить корень через спектральную теорему?", "a": "Корень строится заменой $\\lambda_i$ на $\\sqrt{\\lambda_i}$ в диагональном виде."}, {"ticket": 16, "q": "В чём различие положительного и неотрицательного?", "a": "Единственный неотрицательный корень обозначают $A^{1/2}$."}, {"ticket": 17, "q": "Что такое полярное разложение оператора?", "a": "Полярное разложение — аналог $z=re^{i\\varphi}$: оператор = изометрическая часть × положительная часть."}, {"ticket": 17, "q": "Почему $A^*A$ положителен?", "a": "Для невырожденного $A$ оператор $A^*A$ положительно определён."}, {"ticket": 17, "q": "Как проверить $U^*U=I$?", "a": "$P=(A^*A)^{1/2}$, $U=AP^{-1}$, тогда $A=UP$."}, {"ticket": 17, "q": "Почему разложение единственно?", "a": "Единственность следует из $P^2=A^*A$."}, {"ticket": 18, "q": "Что такое нормированное пространство?", "a": "Норма удовлетворяет положительности, однородности и неравенству треугольника."}, {"ticket": 18, "q": "Какие аксиомы у нормы?", "a": "Норма из скалярного произведения всегда удовлетворяет тождеству параллелограмма."}, {"ticket": 18, "q": "Как понять, что норма не из скалярного произведения?", "a": "Теорема Йордана–фон Неймана: норма порождена скалярным произведением тогда и только тогда, когда выполнено тождество параллелограмма."}, {"ticket": 18, "q": "Что восстанавливает формула поляризации?", "a": "Над $\\mathbb R$ скалярное произведение восстанавливается формулой поляризации."}, {"ticket": 19, "q": "Что такое аффинная плоскость?", "a": "Аффинная плоскость имеет вид $A+U$, где $A$ — точка, $U$ — направляющее подпространство."}, {"ticket": 19, "q": "Почему берётся $(U+W)^\\perp$?", "a": "Расстояние между $A+U$ и $B+W$ определяется ортогональной проекцией $\\overrightarrow{AB}$ на $(U+W)^\\perp$."}, {"ticket": 19, "q": "Как получить формулу для гиперплоскости?", "a": "Расстояние от точки до плоскости — частный случай."}, {"ticket": 19, "q": "Чем точка+вектор отличается от точка+точка?", "a": "Гиперплоскость $a_1x_1+\\cdots+a_nx_n+b=0$ имеет нормальный вектор $a=(a_i)$."}, {"ticket": 20, "q": "Что такое центр масс в аффинной записи?", "a": "Центр масс $C$ задаётся условием $\\sum m_i\\overrightarrow{CP_i}=0$."}, {"ticket": 20, "q": "Почему смешанный член равен нулю?", "a": "Момент инерции относительно точки $A$: $I_A=\\sum m_i\\|\\overrightarrow{AP_i}\\|^2$."}, {"ticket": 20, "q": "Что такое центр масс в аффинной записи?", "a": "Теорема: $I_A=I_C+M\\|\\overrightarrow{AC}\\|^2$, где $M=\\sum m_i$."}, {"ticket": 20, "q": "Как меняется момент при переносе точки отсчёта?", "a": "Смешанный член исчезает из-за определения центра масс."}, {"ticket": 21, "q": "Что такое квадрика в аффинно-евклидовом пространстве?", "a": "Квадрика задаётся уравнением $(Ax,x)+2(b,x)+c=0$ с самосопряжённым $A$."}, {"ticket": 21, "q": "Как понять, что квадрика центральная?", "a": "Если уравнение $Ax_0=-b$ разрешимо, перенос начала убирает линейную часть — квадрика центральная."}, {"ticket": 21, "q": "Почему параболоиды не центральные?", "a": "Если линейная часть в направлении $\\ker A$ остаётся, появляется параболический тип."}, {"ticket": 21, "q": "Как знаки коэффициентов влияют на тип квадрики?", "a": "Классификация задаётся знаками собственных значений и свободным членом."}, {"ticket": 22, "q": "Что такое тензор как полилинейная функция?", "a": "Тензор фиксированного типа — полилинейная функция от заданного числа аргументов."}, {"ticket": 22, "q": "Почему нельзя складывать тензоры разных типов?", "a": "Тензоры одного типа образуют векторное пространство."}, {"ticket": 22, "q": "Почему матрица сама по себе не определяет тип тензора?", "a": "Тензорное произведение увеличивает тип: $T^p_q\\otimes T^r_s\\subset T^{p+r}_{q+s}$."}, {"ticket": 22, "q": "Как меняется тип при тензорном произведении?", "a": "Тензорное произведение билинейно, ассоциативно, но в общем случае некоммутативно."}, {"ticket": 23, "q": "Что такое тензорный базис?", "a": "Тензорный базис строится из произведений базисных ковекторов и базисных векторов."}, {"ticket": 23, "q": "Что такое сопряжённый базис?", "a": "Компоненты — координаты тензора в этом базисе."}, {"ticket": 23, "q": "Почему массив чисел зависит от базиса?", "a": "Тензор как массив чисел эквивалентен полилинейной функции только вместе с законом преобразования координат."}, {"ticket": 23, "q": "Как отличить матрицу оператора от матрицы формы?", "a": "Верхние и нижние индексы преобразуются взаимно обратными матрицами."}, {"ticket": 24, "q": "Что такое свёртка тензора?", "a": "Свёртка связывает один верхний и один нижний индекс и уменьшает тип на $(1,1)$."}, {"ticket": 24, "q": "Почему свёртка не зависит от базиса?", "a": "След оператора — свёртка тензора типа $(1,1)$."}, {"ticket": 24, "q": "Как след оператора связан со свёрткой?", "a": "Действие оператора на вектор можно записать как тензорное произведение и свёртку."}, {"ticket": 24, "q": "Чем отличаются $g_{ij}$ и $g^{ij}$?", "a": "Метрический тензор $g_{ij}$ опускает индексы; обратный $g^{ij}$ поднимает."}, {"ticket": 25, "q": "Что такое симметрический тензор?", "a": "Симметрический тензор не меняется при перестановке аргументов."}, {"ticket": 25, "q": "Почему $\\operatorname{Sym}$ — проектор?", "a": "Кососимметрический тензор меняется на знак перестановки."}, {"ticket": 25, "q": "Что означает знак перестановки?", "a": "$\\operatorname{Sym}$ — усреднение по всем перестановкам."}, {"ticket": 25, "q": "Почему при $p\\ge3$ есть смешанные типы симметрии?", "a": "$\\operatorname{Alt}$ — усреднение с множителем $\\operatorname{sgn}(\\sigma)$."}, {"ticket": 26, "q": "Что такое симметрическое произведение?", "a": "Симметрическое произведение — симметризация тензорного произведения."}, {"ticket": 26, "q": "Почему размерность равна числу мономов?", "a": "Оно переводит $S^p(V^*)\\times S^q(V^*)$ в $S^{p+q}(V^*)$."}, {"ticket": 26, "q": "Как симметрическое произведение связано с многочленами?", "a": "Базис $S^p(V^*)$ соответствует мономам степени $p$."}, {"ticket": 26, "q": "Почему произведение коммутативно?", "a": "Симметрическая алгебра изоморфна алгебре многочленов от $n$ переменных."}, {"ticket": 27, "q": "Что такое внешнее произведение?", "a": "Внешнее произведение строится через альтернирование тензорного произведения."}, {"ticket": 27, "q": "Почему повтор даёт ноль?", "a": "Если повторяется ковектор, внешнее произведение равно нулю."}, {"ticket": 27, "q": "Как посчитать размерность внешней степени?", "a": "Базис $\\Lambda^p(V^*)$ задаётся $e^{i_1}\\wedge\\cdots\\wedge e^{i_p}$ при $i_1<\\cdotsВнешняя алгебра изоморфна алгебре грассмановых переменных.Ключевые формулыВнешнее произведение$\\alpha\\wedge\\beta=\\operatorname{Alt}(\\alpha\\otimes\\beta)$Градуированная коммутативность$\\alpha\\wedge\\beta=(-1)^{pq}\\beta\\wedge\\alpha$Размерность$\\dim\\Lambda^p(V^*)=\\binom np$Алгебра$\\Lambda(V^*)=\\bigoplus_{p=0}^n\\Lambda^p(V^*)$ПримерыВ $\\mathbb R^3$ базис $\\Lambda^2$ — $e^1\\wedge e^2$, $e^1\\wedge e^3$, $e^2\\wedge e^3$.$e^1\\wedge e^1=0$.Верхняя форма $e^1\\wedge\\cdots\\wedge e^n$ связана с определителем.Проверочные вопросыПочему повтор даёт ноль?Как посчитать размерность внешней степени?Что такое грассманова переменная?"}, {"ticket": 27, "q": "Что такое грассманова переменная?", "a": "Внешняя алгебра изоморфна алгебре грассмановых переменных."}];let pool=allCards,i=0,flipped=false;const el=document.getElementById('flashcard'),sel=document.getElementById('trainerTicket');function render(){const c=pool[i]||allCards[0];el.innerHTML=`<div><div>${flipped?c.a:c.q}</div><div class="flash-meta">Билет ${c.ticket} · карточка ${i+1}/${pool.length}</div></div>`;if(window.MathJax)MathJax.typesetPromise([el]);}sel.onchange=()=>{pool=sel.value==='all'?allCards:allCards.filter(c=>String(c.ticket)===sel.value);i=0;flipped=false;render();};flipCard.onclick=()=>{flipped=!flipped;render();};nextCard.onclick=()=>{i=(i+1)%pool.length;flipped=false;render();};prevCard.onclick=()=>{i=(i-1+pool.length)%pool.length;flipped=false;render();};el.onclick=()=>{flipped=!flipped;render();};render();</script><footer class="footer"><p>Линейная Алгебра: Экзамен · билеты 1–27 · статический GitHub Pages.</p><p><a href="sources.html">Источники</a></p></footer><script src="assets/app.js"></script></body></html>
