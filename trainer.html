<main class="container">
  <h1 class="section-title">Тренажёр устного ответа</h1>
  <div class="panel">
    <p>Кликни по карточке, чтобы перевернуть её. Это быстрый режим самопроверки перед тем, как идти в полный билет.</p>
    <div id="flashcard" class="flashcard ticket-card"></div>
    <div class="actions">
      <button id="prevCard" class="button secondary">← Назад</button>
      <button id="flipCard" class="button">Показать ответ</button>
      <button id="nextCard" class="button secondary">Дальше →</button>
    </div>
  </div>
</main>
<script>
const cards = [{"q": "Что такое билинейная форма?", "a": "Отображение $\beta:V\times V\to\\mathbb F$, линейное по каждому аргументу.", "ticket": 1}, {"q": "Как меняется матрица билинейной формы при замене базиса?", "a": "Если $X=CY$, то $B\\prime=C^TBC$.", "ticket": 1}, {"q": "В чём смысл критерия Сильвестра?", "a": "Квадратичная форма положительно определена тогда и только тогда, когда все ведущие главные миноры положительны.", "ticket": 5}, {"q": "Что измеряет определитель Грама?", "a": "Квадрат объёма параллелепипеда, натянутого на систему векторов.", "ticket": 8}, {"q": "Что значит нормальный оператор?", "a": "В эрмитовом пространстве $AA^*=A^*A$; такие операторы унитарно диагонализуются.", "ticket": 13}, {"q": "Что такое полярное разложение?", "a": "Для невырожденного оператора $A$ разложение $A=UP$, где $U$ ортогонален/унитарен, а $P$ положителен.", "ticket": 17}, {"q": "Что такое тензор типа $(p,q)$?", "a": "Полилинейная функция от $p$ ковекторных и $q$ векторных аргументов.", "ticket": 22}, {"q": "Что делает свёртка тензора?", "a": "Суммирует по одной верхней и одной нижней паре индексов, уменьшая тип на $(1,1)$.", "ticket": 24}];
let i = 0, flipped = false;
const el = document.getElementById('flashcard');
function render() {
  const c = cards[i];
  el.innerHTML = `<div><div>${flipped ? c.a : c.q}</div><div class="flash-meta">Билет ${c.ticket} · карточка ${i+1}/${cards.length}</div></div>`;
  if (window.MathJax) MathJax.typesetPromise([el]);
}
document.getElementById('flipCard').onclick = () => { flipped = !flipped; render(); };
document.getElementById('nextCard').onclick = () => { i = (i+1)%cards.length; flipped=false; render(); };
document.getElementById('prevCard').onclick = () => { i = (i-1+cards.length)%cards.length; flipped=false; render(); };
el.onclick = () => { flipped = !flipped; render(); };
render();
</script>
