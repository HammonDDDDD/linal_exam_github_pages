тр у унитарного оператора?", "a": "Какой спектр у унитарного оператора?"}, {"ticket": 14, "q": "Что такое кососамосопряжённый оператор?", "a": "$A^*=-A$"}, {"ticket": 15, "q": "Как квадратичная форма связана с самосопряжённым оператором?", "a": "В евклидовом пространстве $q(x)=(Ax,x)$ для некоторого самосопряжённого $A$."}, {"ticket": 15, "q": "Как записать квадратичную форму через оператор?", "a": "$q(x)=(Ax,x)$"}, {"ticket": 15, "q": "Почему соответствующий оператор самосопряжён?", "a": "На устном ответе нужно уметь объяснить: Почему оператор самосопряжён?"}, {"ticket": 15, "q": "Как выглядит приведение к главным осям?", "a": "$q=\\sum\\lambda_i y_i^2$"}, {"ticket": 16, "q": "Что значит $A\\ge0$ для самосопряжённого оператора?", "a": "$A\\ge0$ означает $(Ax,x)\\ge0$ для всех $x$."}, {"ticket": 16, "q": "Как записать неотрицательность оператора?", "a": "$(Ax,x)\\ge0$"}, {"ticket": 16, "q": "Почему собственные значения положительного оператора положительны?", "a": "На устном ответе нужно уметь объяснить: Почему собственные значения положительного оператора положительны?"}, {"ticket": 16, "q": "Чем положительный оператор отличается от неотрицательного?", "a": "$(Ax,x)>0$ при $x\\ne0$"}, {"ticket": 17, "q": "Что такое полярное разложение оператора?", "a": "Полярное разложение — аналог $z=re^{i\\varphi}$: оператор = изометрическая часть × положительная часть."}, {"ticket": 17, "q": "Как записывается полярное разложение?", "a": "$A=UP$"}, {"ticket": 17, "q": "Почему $A^*A$ положительно определён?", "a": "На устном ответе нужно уметь объяснить: Почему $A^*A$ положителен?"}, {"ticket": 17, "q": "Как найти положительную часть в полярном разложении?", "a": "$P=(A^*A)^{1/2}$"}, {"ticket": 18, "q": "Что такое нормированное пространство?", "a": "Норма удовлетворяет положительности, однородности и неравенству треугольника."}, {"ticket": 18, "q": "Какие аксиомы нормы нужно назвать?", "a": "$\\|x\\|\\ge0,\\quad \\|\\alpha x\\|=|\\alpha|\\|x\\|$"}, {"ticket": 18, "q": "Какие аксиомы у нормы?", "a": "Какие аксиомы у нормы?"}, {"ticket": 18, "q": "Как формулируется тождество параллелограмма?", "a": "$\\|x+y\\|^2+\\|x-y\\|^2=2\\|x\\|^2+2\\|y\\|^2$"}, {"ticket": 19, "q": "Что такое аффинная плоскость?", "a": "Аффинная плоскость имеет вид $A+U$, где $A$ — точка, $U$ — направляющее подпространство."}, {"ticket": 19, "q": "Как записывается аффинная плоскость?", "a": "$A+U$"}, {"ticket": 19, "q": "Почему в расстоянии между плоскостями появляется $(U+W)^\\perp$?", "a": "На устном ответе нужно уметь объяснить: Почему берётся $(U+W)^\\perp$?"}, {"ticket": 19, "q": "Как записать расстояние между аффинными плоскостями?", "a": "$\\operatorname{dist}(A+U,B+W)=\\|\\operatorname{pr}_{(U+W)^\\perp}\\overrightarrow{AB}\\|$"}, {"ticket": 20, "q": "Что такое центр масс в аффинной записи?", "a": "Центр масс $C$ задаётся условием $\\sum m_i\\overrightarrow{CP_i}=0$."}, {"ticket": 20, "q": "Как записывается условие центра масс?", "a": "$\\sum_i m_i\\overrightarrow{CP_i}=0$"}, {"ticket": 20, "q": "Почему смешанный член исчезает в теореме Штейнера?", "a": "На устном ответе нужно уметь объяснить: Почему смешанный член равен нулю?"}, {"ticket": 20, "q": "Как записывается момент инерции относительно точки?", "a": "$I_A=\\sum_i m_i\\|\\overrightarrow{AP_i}\\|^2$"}, {"ticket": 21, "q": "Что такое квадрика в аффинно-евклидовом пространстве?", "a": "Квадрика задаётся уравнением $(Ax,x)+2(b,x)+c=0$ с самосопряжённым $A$."}, {"ticket": 21, "q": "Как записывается общее уравнение квадрики?", "a": "$(Ax,x)+2(b,x)+c=0$"}, {"ticket": 21, "q": "Как понять, что квадрика центральная?", "a": "На устном ответе нужно уметь объяснить: Как понять, что квадрика центральная?"}, {"ticket": 21, "q": "Как найти центр квадрики?", "a": "$Ax_0=-b$"}, {"ticket": 22, "q": "Что такое тензор как полилинейная функция?", "a": "Тензор фиксированного типа — полилинейная функция от заданного числа аргументов."}, {"ticket": 22, "q": "Что означает тип тензора $(p,q)$?", "a": "$(p,q)$"}, {"ticket": 22, "q": "Почему нельзя складывать тензоры разных типов?", "a": "На устном ответе нужно уметь объяснить: Почему нельзя складывать тензоры разных типов?"}, {"ticket": 22, "q": "Какие малые типы тензоров нужно знать?", "a": "$T^0_0=\\mathbb F,\\ T^1_0=V^*,\\ T^0_1\\simeq V$"}, {"ticket": 23, "q": "Что такое тензорный базис?", "a": "Тензорный базис строится из произведений базисных ковекторов и базисных векторов."}, {"ticket": 23, "q": "Как выглядит базис пространства тензоров?", "a": "$e^{i_1}\\otimes\\cdots\\otimes e^{i_p}\\otimes e_{j_1}\\otimes\\cdots\\otimes e_{j_q}$"}, {"ticket": 23, "q": "Что такое сопряжённый базис?", "a": "На устном ответе нужно уметь объяснить: Что такое сопряжённый базис?"}, {"ticket": 23, "q": "Что такое компоненты тензора?", "a": "$T^{j_1\\ldots j_q}_{i_1\\ldots i_p}$"}, {"ticket": 24, "q": "Что такое свёртка тензора?", "a": "Свёртка связывает один верхний и один нижний индекс и уменьшает тип на $(1,1)$."}, {"ticket": 24, "q": "Как записывается частичная свёртка?", "a": "$C(T)^a_b=T^{ia}_{ib}$"}, {"ticket": 24, "q": "Почему свёртка не зависит от базиса?", "a": "На устном ответе нужно уметь объяснить: Почему свёртка не зависит от базиса?"}, {"ticket": 24, "q": "Как след оператора выражается как свёртка?", "a": "$\\operatorname{tr}A=A^i_i$"}, {"ticket": 25, "q": "Что такое симметрический тензор?", "a": "Симметрический тензор не меняется при перестановке аргументов."}, {"ticket": 25, "q": "Как записывается оператор симметризации?", "a": "$\\operatorname{Sym}T=\\frac1{p!}\\sum_{\\sigma\\in S_p}F_\\sigma T$"}, {"ticket": 25, "q": "Почему $\\operatorname{Sym}$ является проектором?", "a": "На устном ответе нужно уметь объяснить: Почему $\\operatorname{Sym}$ — проектор?"}, {"ticket": 25, "q": "Как записывается оператор альтернирования?", "a": "$\\operatorname{Alt}T=\\frac1{p!}\\sum_{\\sigma\\in S_p}\\operatorname{sgn}(\\sigma)F_\\sigma T$"}, {"ticket": 26, "q": "Что такое симметрическое произведение?", "a": "Симметрическое произведение — симметризация тензорного произведения."}, {"ticket": 26, "q": "Как записывается симметрическое произведение?", "a": "$S\\odot T=\\operatorname{Sym}(S\\otimes T)$"}, {"ticket": 26, "q": "Почему размерность $S^p(V^*)$ равна числу мономов?", "a": "На устном ответе нужно уметь объяснить: Почему размерность равна числу мономов?"}, {"ticket": 26, "q": "Какова размерность пространства симметрических тензоров?", "a": "$\\dim S^p(V^*)=\\binom{n+p-1}{p}$"}, {"ticket": 27, "q": "Что такое внешнее произведение?", "a": "Внешнее произведение строится через альтернирование тензорного произведения."}, {"ticket": 27, "q": "Как внешнее произведение связано с альтернированием?", "a": "$\\alpha\\wedge\\beta=\\operatorname{Alt}(\\alpha\\otimes\\beta)$"}, {"ticket": 27, "q": "Почему повторяющийся ковектор даёт ноль?", "a": "На устном ответе нужно уметь объяснить: Почему повтор даёт ноль?"}, {"ticket": 27, "q": "Как записывается градуированная коммутативность внешнего произведения?", "a": "$\\alpha\\wedge\\beta=(-1)^{pq}\\beta\\wedge\\alpha$"}];let pool=allCards,i=0,flipped=false;const el=document.getElementById('flashcard'),sel=document.getElementById('trainerTicket');function render(){const c=pool[i]||allCards[0];el.innerHTML=`<div><div>${flipped?c.a:c.q}</div><div class="flash-meta">Билет ${c.ticket} · карточка ${i+1}/${pool.length}</div></div>`;if(window.MathJax)MathJax.typesetPromise([el]);}sel.onchange=()=>{pool=sel.value==='all'?allCards:allCards.filter(c=>String(c.ticket)===sel.value);i=0;flipped=false;render();};flipCard.onclick=()=>{flipped=!flipped;render();};nextCard.onclick=()=>{i=(i+1)%pool.length;flipped=false;render();};prevCard.onclick=()=>{i=(i-1+pool.length)%pool.length;flipped=false;render();};el.onclick=()=>{flipped=!flipped;render();};render();</script><footer class="footer"><p>Линейная Алгебра: Экзамен · билеты 1–27 · статический GitHub Pages.</p><p><a href="sources.html">Источники</a></p></footer><script src="assets/app.js"></script></body></html>
