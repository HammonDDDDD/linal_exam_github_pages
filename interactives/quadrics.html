oveTo(0,oy);ctx.lineTo(W,oy);ctx.moveTo(ox,0);ctx.lineTo(ox,H);ctx.stroke();let a=+qa.value,b=+qb.value;if(Math.abs(a)<.12)a=.12*Math.sign(a||1);if(Math.abs(b)<.12)b=.12*Math.sign(b||1);ctx.strokeStyle='#3659a5';ctx.lineWidth=2;ctx.beginPath();let open=false;for(let x=-5;x<=5;x+=.02){let y2=(1-a*x*x)/b;if(y2>=0){let y=Math.sqrt(y2),X=ox+x*sc,Y=oy-y*sc;if(!open){ctx.moveTo(X,Y);open=true}else ctx.lineTo(X,Y)}else open=false}open=false;for(let x=-5;x<=5;x+=.02){let y2=(1-a*x*x)/b;if(y2>=0){let y=-Math.sqrt(y2),X=ox+x*sc,Y=oy-y*sc;if(!open){ctx.moveTo(X,Y);open=true}else ctx.lineTo(X,Y)}else open=false}ctx.stroke();let type=(a>0&&b>0)?'эллипс':(a*b<0?'гипербола':'мнимый/вырожденный случай');quadText.innerHTML=`Тип: <b>${type}</b>. $a=${a.toFixed(1)}, b=${b.toFixed(1)}$.`;if(MathJax)MathJax.typesetPromise([quadText]);}drawQ();</script></main><footer class="footer"><p>Линейная Алгебра: Экзамен · билеты 1–27 · статический GitHub Pages.</p><p><a href="../sources.html">Источники</a></p></footer><script src="../assets/app.js"></script></body></html>
