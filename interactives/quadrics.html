<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Интерактив: квадрики · Линейная Алгебра: Экзамен</title><link rel="stylesheet" href="../assets/style.css"><link rel="icon" href="../assets/favicon.svg" type="image/svg+xml"><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true,macros:{R:"\\mathbb{R}",C:"\\mathbb{C}",F:"\\mathbb{F}",Ker:"\\operatorname{Ker}",rk:"\\operatorname{rk}",tr:"\\operatorname{tr}",Sym:"\\operatorname{Sym}",Alt:"\\operatorname{Alt}",dist:"\\operatorname{dist}",pr:"\\operatorname{pr}",ort:"\\operatorname{ort}",End:"\\operatorname{End}",Hom:"\\operatorname{Hom}"}},svg:{fontCache:"global"}};</script><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script></head><body><header class="topbar"><a class="brand" href="../index.html"><span class="brand-icon">LA</span><span>Линейная Алгебра: Экзамен</span></a><nav><a class="" href="../index.html">Билеты</a><a class="" href="../map.html">Карта</a><a class="" href="../trainer.html">Тренажёр</a><a class="" href="../formulas.html">Формулы</a><a class="active" href="../interactives.html">Интерактивы</a></nav><button id="themeToggle" class="icon-button">◐</button></header><main class="container"><h1 class="section-title">Интерактив: квадрики</h1><div class="canvas-card panel"><canvas id="quad" width="760" height="460"></canvas><div class="controls"><label>$a$ в $ax^2+by^2=1$<input id="qa" type="range" min="-3" max="3" step="0.1" value="1"></label><label>$b$ в $ax^2+by^2=1$<input id="qb" type="range" min="-3" max="3" step="0.1" value="1"></label><p id="quadText"></p><p><a href="../tickets/ticket-21.html">Билет 21</a></p></div></div><script>
const qaEl=document.getElementById('qa'), qbEl=document.getElementById('qb'), canvas=document.getElementById('quad'), ctx=canvas.getContext('2d'), quadText=document.getElementById('quadText');
qaEl.addEventListener('input', drawQ); qbEl.addEventListener('input', drawQ);
function drawQ(){
  const W=canvas.width,H=canvas.height,ox=W/2,oy=H/2,sc=52;
  ctx.clearRect(0,0,W,H); ctx.lineWidth=1; ctx.strokeStyle='#9aa4b2';
  ctx.beginPath(); ctx.moveTo(0,oy); ctx.lineTo(W,oy); ctx.moveTo(ox,0); ctx.lineTo(ox,H); ctx.stroke();
  let a=+qaEl.value,b=+qbEl.value; if(Math.abs(a)<.15)a=.15*Math.sign(a||1); if(Math.abs(b)<.15)b=.15*Math.sign(b||1);
  function plotBranch(sign){let drawing=false; ctx.beginPath(); for(let x=-6;x<=6;x+=.015){let y2=(1-a*x*x)/b; if(y2>=0 && Number.isFinite(y2)){let y=sign*Math.sqrt(y2), X=ox+x*sc, Y=oy-y*sc; if(!drawing){ctx.moveTo(X,Y); drawing=true}else ctx.lineTo(X,Y)} else drawing=false;} ctx.stroke();}
  ctx.strokeStyle='#4ea1ff'; ctx.lineWidth=2.5; plotBranch(1); plotBranch(-1);
  let type=(a>0&&b>0)?'эллипс':(a*b<0?'гипербола':'мнимый/вырожденный случай');
  quadText.innerHTML=`Тип: <b>${type}</b>. Уравнение: $${a.toFixed(1)}x^2+${b.toFixed(1)}y^2=1$.`;
  if(window.MathJax) MathJax.typesetPromise([quadText]).catch(()=>{});
}
drawQ();
</script></main><footer class="footer"><p>Линейная Алгебра: Экзамен · билеты 1–27 · статический GitHub Pages.</p><p><a href="../sources.html">Источники</a></p></footer><script src="../assets/app.js"></script></body></html>
