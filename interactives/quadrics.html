<main class="container">
  <h1 class="section-title">Интерактив: центральные квадрики на плоскости</h1>
  <div class="canvas-card panel">
    <canvas id="quad" width="760" height="460"></canvas>
    <div class="controls">
      <label>$a$ в $ax^2+by^2=1$ <input id="qa" type="range" min="-3" max="3" step="0.1" value="1"></label>
      <label>$b$ в $ax^2+by^2=1$ <input id="qb" type="range" min="-3" max="3" step="0.1" value="1"></label>
      <p id="quadText"></p>
      <p><a href="../tickets/ticket-21.html">Перейти к билету 21</a></p>
    </div>
  </div>
</main>
<script>
qa.oninput=qb.oninput=drawQ;function drawQ(){const cv=quad,ctx=cv.getContext('2d'),W=cv.width,H=cv.height,ox=W/2,oy=H/2,sc=52;ctx.clearRect(0,0,W,H);ctx.strokeStyle='#c9c2b6';ctx.beginPath();ctx.moveTo(0,oy);ctx.lineTo(W,oy);ctx.moveTo(ox,0);ctx.lineTo(ox,H);ctx.stroke();let a=+qa.value,b=+qb.value;if(Math.abs(a)<.12)a=.12*Math.sign(a||1);if(Math.abs(b)<.12)b=.12*Math.sign(b||1);ctx.fillStyle='#405c9b';ctx.strokeStyle='#405c9b';ctx.lineWidth=2;ctx.beginPath();let first=true;for(let x=-5;x<=5;x+=.01){let y2=(1-a*x*x)/b;if(y2>=0){let y=Math.sqrt(y2);for(const yy of [y,-y]){let X=ox+x*sc,Y=oy-yy*sc;if(first){ctx.moveTo(X,Y);first=false}else ctx.lineTo(X,Y)}}else first=true}ctx.stroke();let type=(a>0&&b>0)?'эллипс':(a*b<0?'гипербола':'мнимый/вырожденный случай');quadText.innerHTML=`Тип: <b>${type}</b>. Знаки коэффициентов: $a=${a.toFixed(1)}, b=${b.toFixed(1)}$.`;if(window.MathJax)MathJax.typesetPromise([quadText]);}drawQ();
</script>
