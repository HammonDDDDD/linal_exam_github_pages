nnerHTML=`$$Q=\\begin{pmatrix}${A}&${B}\\\\${B}&${C}\\end{pmatrix},\\quad \\Delta_1=${A},\\quad\\Delta_2=${D}.$$<b>${A>0&&D>0?'Положительно определена':'Не проходит критерий положительной определённости'}</b>`;if(MathJax)MathJax.typesetPromise([out]);let ctx=c.getContext('2d'),W=c.width,H=c.height;ctx.clearRect(0,0,W,H);ctx.strokeStyle='#ddd';ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.fillStyle='#3659a5';ctx.font='18px sans-serif';ctx.fillText('Сильвестр для 2×2: a>0 и ac-b²>0',50,60)}draw();</script></main><footer class="footer"><p>Линейная Алгебра: Экзамен · билеты 1–27 · статический GitHub Pages.</p><p><a href="../sources.html">Источники</a></p></footer><script src="../assets/app.js"></script></body></html>
