<script>
const ids=['x1a','x1b','x2a','x2b']; ids.forEach(id=>document.getElementById(id).oninput=draw);
function draw(){const cv=document.getElementById('gs'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height,sc=45,ox=W/2,oy=H/2;ctx.clearRect(0,0,W,H);ctx.strokeStyle='#c9c2b6';ctx.beginPath();ctx.moveTo(0,oy);ctx.lineTo(W,oy);ctx.moveTo(ox,0);ctx.lineTo(ox,H);ctx.stroke();let x1=[+x1a.value,+x1b.value],x2=[+x2a.value,+x2b.value];let dot=x1[0]*x2[0]+x1[1]*x2[1],n=x1[0]*x1[0]+x1[1]*x1[1],k=dot/n,pr=[k*x1[0],k*x1[1]],u=[x2[0]-pr[0],x2[1]-pr[1]];function P(v){return [ox+v[0]*sc,oy-v[1]*sc]}function arrow(v,color,label){let p=P(v);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(p[0],p[1]);ctx.stroke();ctx.fillText(label,p[0]+6,p[1]-6)}ctx.font='16px sans-serif';arrow(x1,'#405c9b','x₁');arrow(x2,'#a84b33','x₂');arrow(pr,'#2f7f68','pr');let pp=P(pr),pu=P(x2);ctx.setLineDash([6,6]);ctx.strokeStyle='#2f7f68';ctx.beginPath();ctx.moveTo(pp[0],pp[1]);ctx.lineTo(pu[0],pu[1]);ctx.stroke();ctx.setLineDash([]);document.getElementById('gsText').innerHTML=`$u_2=x_2-\\operatorname{pr}_{x_1}x_2\\approx(${u[0].toFixed(2)},${u[1].toFixed(2)})$`; if(window.MathJax)MathJax.typesetPromise([document.getElementById('gsText')]);} draw();
</script>
