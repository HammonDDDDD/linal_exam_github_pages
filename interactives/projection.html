<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Интерактив: ортогональная проекция · Линейная Алгебра: Экзамен</title><link rel="stylesheet" href="../assets/style.css"><link rel="icon" href="../assets/favicon.svg" type="image/svg+xml"><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true,macros:{pr:"\\operatorname{pr}",ort:"\\operatorname{ort}"}},svg:{fontCache:"global"}};</script><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script></head><body><header class="topbar"><a class="brand" href="../index.html"><span class="brand-icon">LA</span><span>Линейная Алгебра: Экзамен</span></a><nav><a href="../index.html">Билеты</a><a href="../map.html">Карта</a><a href="../trainer.html">Тренажёр</a><a href="../formulas.html">Формулы</a><a class="active" href="../interactives.html">Интерактивы</a></nav><button id="themeToggle" class="icon-button">◐</button></header><main class="container"><h1 class="section-title">Интерактив: ортогональная проекция</h1><div class="canvas-card panel"><canvas id="projCanvas" width="760" height="460"></canvas><div class="controls"><label>$x_1$<input id="px" type="range" min="-5" max="5" step="0.1" value="3"></label><label>$x_2$<input id="py" type="range" min="-5" max="5" step="0.1" value="2"></label><label>угол прямой $U$<input id="ang" type="range" min="0" max="180" step="1" value="25"></label><div id="projOut" class="output-box"></div><p><a href="../tickets/ticket-07.html">Билет 7</a></p></div></div></main><script>const C=projCanvas,ctx=C.getContext('2d');[px,py,ang].forEach(e=>e.addEventListener('input',draw));function P(v){return [C.width/2+v[0]*45,C.height/2-v[1]*45]}function arr(v,col,lbl){const [x,y]=P(v);ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(C.width/2,C.height/2);ctx.lineTo(x,y);ctx.stroke();ctx.fillText(lbl,x+8,y-8)}function draw(){ctx.clearRect(0,0,C.width,C.height);let x=[+px.value,+py.value],t=+ang.value*Math.PI/180,u=[Math.cos(t),Math.sin(t)],dot=x[0]*u[0]+x[1]*u[1],pr=[dot*u[0],dot*u[1]],ort=[x[0]-pr[0],x[1]-pr[1]];ctx.font='16px sans-serif';ctx.strokeStyle='#9aa4b2';ctx.beginPath();let p1=P([-7*u[0],-7*u[1]]),p2=P([7*u[0],7*u[1]]);ctx.moveTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.stroke();arr(x,'#4ea1ff','x');arr(pr,'#80e0bd','pr');let a=P(pr),b=P(x);ctx.setLineDash([6,6]);ctx.strokeStyle='#80e0bd';ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();ctx.setLineDash([]);projOut.innerHTML=`$$x=\operatorname{pr}_U x+\operatorname{ort}_U x,\quad \operatorname{pr}_U x\approx(${pr[0].toFixed(2)},${pr[1].toFixed(2)}).$$`;if(window.MathJax)MathJax.typesetPromise([projOut]).catch(()=>{})}draw();</script><footer class="footer"><p><a href="../sources.html">Источники</a></p></footer><script src="../assets/app.js"></script></body></html>
