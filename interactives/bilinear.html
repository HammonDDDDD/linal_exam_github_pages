<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Интерактив: билинейная форма · Линейная Алгебра: Экзамен</title><link rel="stylesheet" href="../assets/style.css"><link rel="icon" href="../assets/favicon.svg" type="image/svg+xml"><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true,macros:{R:"\\mathbb{R}",C:"\\mathbb{C}",F:"\\mathbb{F}",Ker:"\\operatorname{Ker}",rk:"\\operatorname{rk}",tr:"\\operatorname{tr}",Sym:"\\operatorname{Sym}",Alt:"\\operatorname{Alt}",dist:"\\operatorname{dist}",pr:"\\operatorname{pr}",ort:"\\operatorname{ort}",End:"\\operatorname{End}",Hom:"\\operatorname{Hom}"}},svg:{fontCache:"global"}};</script><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script></head><body><header class="topbar"><a class="brand" href="../index.html"><span class="brand-icon">LA</span><span>Линейная Алгебра: Экзамен</span></a><nav><a class="" href="../index.html">Билеты</a><a class="" href="../map.html">Карта</a><a class="" href="../trainer.html">Тренажёр</a><a class="" href="../formulas.html">Формулы</a><a class="active" href="../interactives.html">Интерактивы</a></nav><button id="themeToggle" class="icon-button">◐</button></header><main class="container"><h1 class="section-title">Интерактив: билинейная форма</h1><div class="canvas-card panel"><canvas id="c" width="760" height="420"></canvas><div class="controls"><label>$b_{11}$<input id="b11" type="range" min="-5" max="5" value="1" step="1"></label><label>$b_{12}$<input id="b12" type="range" min="-5" max="5" value="2" step="1"></label><label>$b_{21}$<input id="b21" type="range" min="-5" max="5" value="2" step="1"></label><label>$b_{22}$<input id="b22" type="range" min="-5" max="5" value="3" step="1"></label><p id="out"></p><p><a href="../tickets/ticket-01.html">Билет 1</a></p></div></div><script>
const els=['b11','b12','b21','b22'].reduce((m,id)=>(m[id]=document.getElementById(id),m),{});
Object.values(els).forEach(el=>el.addEventListener('input', draw));
function draw(){
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d'), out=document.getElementById('out');
  const B=[+els.b11.value,+els.b12.value,+els.b21.value,+els.b22.value];
  const x=[1,2], y=[2,1];
  const val=x[0]*(B[0]*y[0]+B[1]*y[1])+x[1]*(B[2]*y[0]+B[3]*y[1]);
  out.innerHTML=`$$B=\\begin{pmatrix}${B[0]}&${B[1]}\\\\${B[2]}&${B[3]}\\end{pmatrix},\\quad x=(1,2),\\ y=(2,1),\\quad x^TBy=${val}.$$<br>${B[1]===B[2]?'Матрица симметрична: $B^T=B$.':'Матрица несимметрична: $B^T\\ne B$.'}`;
  if(window.MathJax) MathJax.typesetPromise([out]).catch(()=>{});
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--line')||'#ddd';
  ctx.beginPath(); ctx.moveTo(60,210); ctx.lineTo(700,210); ctx.moveTo(380,40); ctx.lineTo(380,380); ctx.stroke();
  ctx.font='17px sans-serif'; ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text')||'#111';
  ctx.fillText('β(x,y)=xᵀBy',50,45); ctx.fillText('Симметричность формы ⇔ Bᵀ=B',50,75);
  const scale=32, ox=380, oy=210;
  function arrow(v,color,label){ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+v[0]*scale,oy-v[1]*scale);ctx.stroke();ctx.fillText(label,ox+v[0]*scale+8,oy-v[1]*scale-8)}
  arrow(x,'#4ea1ff','x=(1,2)'); arrow(y,'#80e0bd','y=(2,1)');
}
draw();
</script></main><footer class="footer"><p>Линейная Алгебра: Экзамен · билеты 1–27 · статический GitHub Pages.</p><p><a href="../sources.html">Источники</a></p></footer><script src="../assets/app.js"></script></body></html>
